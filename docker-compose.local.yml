
# =============================================================================
# Local development overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up
# (run.sh handles this automatically with ./run.sh dev)
# =============================================================================

services:

  traefik:
    ports:
      - "8090:80"     # HTTP redirect (avoids conflict with host port 80)
      - "4443:443"    # HTTPS — access the app via https://localhost:4443
      - "8080:8080"   # Traefik dashboard

  backend:
    build:
      target: development
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      LOG_LEVEL: debug

  frontend:
    build:
      target: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/angular.json:/app/angular.json
      - ./frontend/ionic.config.json:/app/ionic.config.json
    ports:
      - "4200:4200"   # Direct access for ng serve (optional)
    command: ["npx", "ng", "serve", "--host", "0.0.0.0", "--port", "4200", "--disable-host-check"]
    labels:
      - "traefik.http.services.frontend.loadbalancer.server.port=4200"

  storybook:
    build:
      context: ./frontend
      target: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/.storybook:/app/.storybook
      - ./frontend/angular.json:/app/angular.json
    ports:
      - "6006:6006"
    command: ["npm", "run", "storybook"]
    networks:
      - internal

  keycloak:
    environment:
      KC_LOG_LEVEL: info
      KC_HOSTNAME_STRICT: "false"
