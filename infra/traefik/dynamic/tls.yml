# Traefik dynamic config — local TLS (self-signed certificates)
# This file is used when TLS_MODE=local
# For production (TLS_MODE=letsencrypt), Traefik uses ACME automatically.

tls:
  certificates:
    - certFile: /etc/traefik/certs/local.crt
      keyFile: /etc/traefik/certs/local.key

  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/local.crt
        keyFile: /etc/traefik/certs/local.key
